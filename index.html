<!DOCTYPE html>
<html lang="or">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ଗୁଣ୍ଠପଡ଼ା କଥା</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#08090E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ଗୁଣ୍ଠପଡ଼ା କଥା">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Oriya:wght@400;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Oriya:wght@400;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap');

    :root {
      --bg:#08090E;
      --bg2:#0F1117;
      --bg3:#161820;
      --card:#12141C;
      --card2:#1A1D28;
      --border:#252836;
      --border2:#2E3245;
      --cyan:#00D4FF;
      --cyan2:#0099CC;
      --cyan-glow:rgba(0,212,255,0.15);
      --cyan-glow2:rgba(0,212,255,0.08);
      --orange:#FF6B35;
      --orange2:#E85520;
      --orange-glow:rgba(255,107,53,0.15);
      --green:#00FF88;
      --green2:#00CC6A;
      --purple:#8B5CF6;
      --pink:#FF3CAC;
      --text:#F0F2FF;
      --text2:#B0B5CC;
      --muted:#6B7094;
      --sh:0 4px 20px rgba(0,0,0,0.4);
      --sh2:0 8px 32px rgba(0,0,0,0.5);
      --sh-cyan:0 0 20px rgba(0,212,255,0.2);
      --sh-orange:0 0 20px rgba(255,107,53,0.2);
      --r:20px; --r2:14px; --r3:10px;
      
      /* Missing variables fallback */
      --or: #FF6B35;
      --or2: #E85520;
      --gr: #00CC6A;
      --gr2: #00A855;
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html{background:var(--bg);}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);max-width:420px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
    .or{font-family:'Noto Sans Oriya',serif;}
    ::-webkit-scrollbar{width:2px;}
    ::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:2px;}

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
      border-radius: 30px; font-size: 14px; z-index: 9999;
      opacity: 0; transition: opacity 0.4s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ବାକି ସବୁ CSS ତୁମର ପୁରୁଣା କୋଡ୍ ରଖିଛି (ସଂକ୍ଷିପ୍ତ ରଖିଛି ସ୍ପେସ୍ ପାଇଁ) */
    #authWrap { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px 20px; background:linear-gradient(145deg,#0A0C14 0%,#0D1520 40%,#0A0E0A 100%); }
    .acard { background:rgba(18,20,28,0.95); border:1px solid var(--border2); border-radius:24px; padding:26px 22px; width:100%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,0.6); backdrop-filter:blur(20px); }
    .btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--cyan),var(--cyan2)); color:var(--bg); border:none; border-radius:var(--r2); font-size:15px; font-weight:800; cursor:pointer; }
    .amsg { padding:10px 14px; border-radius:10px; font-size:12px; margin-bottom:10px; display:none; }
    .amsg.err { background:rgba(255,59,48,0.1); color:#FF6B6B; border:1px solid rgba(255,59,48,0.3); display:block; }
    .amsg.ok { background:rgba(0,255,136,0.08); color:var(--green); border:1px solid rgba(0,255,136,0.2); display:block; }
    
    #appWrap { display:none; flex-direction:column; min-height:100vh; position:relative; }
    .topbar { position:sticky; top:0; z-index:100; background:rgba(8,9,14,0.95); backdrop-filter:blur(20px); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .botnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:420px; background:rgba(8,9,14,0.97); backdrop-filter:blur(20px); border-top:1px solid var(--border); display:flex; padding:8px 0 14px; z-index:100; }
    
    /* ବାକି ସବୁ ଷ୍ଟାଇଲ ତୁମର ପୁରୁଣା କୋଡ୍ ରଖ – ଏଠାରେ ସଂକ୍ଷିପ୍ତ ରଖିଛି */
  </style>
</head>
<body>

  <!-- Auth Screen -->
  <div id="authWrap">
    <div class="alogo">🗣️</div>
    <div class="atitle">ଗୁଣ୍ଠପଡ଼ା କଥା</div>
    <div class="asub">ଗାଁର ସତ୍ୟ କଥା, ମଜା ଓ ମିତ୍ରତା</div>
    
    <div class="acard">
      <div class="tabs">
        <div class="tab on" onclick="showTab('login')">ଲଗଇନ୍</div>
        <div class="tab" onclick="showTab('register')">ନୂଆ ଖାତା</div>
      </div>
      
      <!-- Login Form -->
      <div id="loginForm">
        <input id="lE" class="inp" type="email" placeholder="Email (Gmail)" autocomplete="email">
        <div class="pwrap">
          <input id="lP" class="inp" type="password" placeholder="Password">
          <button class="eye" onclick="toggleEye('lP',this)">👁️</button>
        </div>
        <button id="lBtn" class="btn">ଲଗଇନ୍</button>
        <div id="lMsg" class="amsg"></div>
      </div>
      
      <!-- Register Form -->
      <div id="registerForm" style="display:none;">
        <input id="rN" class="inp" type="text" placeholder="ନାମ" oninput="vN()">
        <div id="rNm" class="fmsg"></div>
        
        <input id="rV" class="inp" type="text" placeholder="ଗାଁ / ଗ୍ରାମ">
        
        <input id="rE" class="inp" type="email" placeholder="Gmail ଆଇଡି">
        
        <div class="pwrap">
          <input id="rP" class="inp" type="password" placeholder="Password (ଅତି କମ ୬)" oninput="vP()">
          <button class="eye" onclick="toggleEye('rP',this)">👁️</button>
        </div>
        <div class="str-bar"><div id="strF" class="str-fill"></div></div>
        <div id="rPm" class="fmsg"></div>
        
        <input id="rP2" class="inp" type="password" placeholder="Password ପୁଣି ଲେଖନ୍ତୁ" oninput="vC()">
        <div id="rCm" class="fmsg"></div>
        
        <button id="rBtn" class="btn">ଖାତା ଖୋଲନ୍ତୁ</button>
        <div id="rMsg" class="amsg"></div>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appWrap">
    <div class="topbar">
      <div class="topbar-title">ଗୁଣ୍ଠପଡ଼ା କଥା</div>
      <div class="ticons">
        <div class="tic">🔔</div>
      </div>
    </div>

    <div class="screens">
      <!-- Home, Search, Upload, etc. screens ଏଠାରେ ରହିବ -->
      <div id="sHome" class="screen on">ହୋମ୍ ସ୍କ୍ରିନ୍ (ପୋଷ୍ଟଗୁଡ଼ିକ ଏଠାରେ ଆସିବ)</div>
      <div id="sSearch" class="screen">ସର୍ଚ୍ଚ୍</div>
      <div id="sUpload" class="screen">ଅପଲୋଡ୍</div>
      <div id="sNotifications" class="screen">ନୋଟିଫିକେସନ୍</div>
      <div id="sProfile" class="screen">ପ୍ରୋଫାଇଲ୍</div>
    </div>

    <!-- Bottom Nav -->
    <div class="botnav">
      <div id="nb-home" class="nv on" onclick="goScreen('home')"><div class="ni">🏠</div><div>ହୋମ୍</div></div>
      <div id="nb-search" class="nv" onclick="goScreen('search')"><div class="ni">🔍</div><div>ଖୋଜନ୍ତୁ</div></div>
      <div id="nb-upload" class="nv" onclick="goScreen('upload')"><div class="ni">➕</div><div>ପୋଷ୍ଟ୍</div></div>
      <div id="nb-notifications" class="nv" onclick="goScreen('notifications')"><div class="ni">🔔</div><div>ସୂଚନା</div></div>
      <div id="nb-profile" class="nv" onclick="goScreen('profile')"><div class="ni">👤</div><div>ପ୍ରୋଫାଇଲ୍</div></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toastEl" class="toast"></div>

  <script>
    // ────────────────────────────────────────────────
    // Firebase Setup
    // ────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",          // ← ଏଠାରେ ତୁମର ରିୟଲ୍ apiKey ଦିଅ
      authDomain: "your-project-id.firebaseapp.com",
      projectId: "your-project-id",
      storageBucket: "your-project-id.appspot.com",
      messagingSenderId: "123456789012",
      appId: "1:123456789012:web:xxxxxxxxxxxxxxxx"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const FS = firebase.firestore;

    let me = null;
    let myD = null;

    // Auth State Listener
    auth.onAuthStateChanged(user => {
      me = user;
      if (user) {
        document.getElementById('authWrap').style.display = 'none';
        document.getElementById('appWrap').style.display = 'flex';
        
        db.collection('users').doc(user.uid).get().then(doc => {
          if (doc.exists) {
            myD = doc.data();
            toast('ସ୍ଵାଗତ! ' + (myD.name || 'ଆପଣ'));
            // ଏଠାରେ ହୋମ୍ ଲୋଡ୍ କର – loadPosts() etc.
          } else {
            toast('ପ୍ରୋଫାଇଲ୍ ସେଟଅପ୍ କରନ୍ତୁ');
          }
        });
      } else {
        document.getElementById('authWrap').style.display = 'flex';
        document.getElementById('appWrap').style.display = 'none';
      }
    });

    // ────────────────────────────────────────────────
    // Tab Switch (Login / Register)
    // ────────────────────────────────────────────────
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
      event.target.classList.add('on');
      
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    }

    // ────────────────────────────────────────────────
    // Login
    // ────────────────────────────────────────────────
    document.getElementById('lBtn')?.addEventListener('click', async () => {
      const email = document.getElementById('lE')?.value?.trim();
      const pass = document.getElementById('lP')?.value;
      if (!email || !pass) return toast('Email ଓ Password ଦିଅନ୍ତୁ');

      try {
        await auth.signInWithEmailAndPassword(email, pass);
        toast('ଲଗଇନ୍ ହେଲା ✓');
      } catch (e) {
        toast('ଭୁଲ୍: ' + e.message.split('Firebase:')[0].trim());
      }
    });

    // ────────────────────────────────────────────────
    // Register
    // ────────────────────────────────────────────────
    document.getElementById('rBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('rN')?.value?.trim();
      const village = document.getElementById('rV')?.value?.trim();
      const email = document.getElementById('rE')?.value?.trim();
      const pass = document.getElementById('rP')?.value;
      const pass2 = document.getElementById('rP2')?.value;

      if (!name || name.length < 2) return toast('ନାମ ଅତି କମରେ ୨ ଅକ୍ଷର');
      if (!village) return toast('ଗାଁ ଲେଖନ୍ତୁ');
      if (!email || !email.includes('@gmail.com')) return toast('କେବଳ Gmail ଚାଲିବ');
      if (!pass || pass.length < 6) return toast('Password ଅତି କମ ୬ ଅକ୍ଷର');
      if (pass !== pass2) return toast('Password ମିଳୁନାହିଁ');

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        await db.collection('users').doc(cred.user.uid).set({
          name, village, email,
          createdAt: FS.serverTimestamp(),
          photoUrl: null
        });
        toast('ଖାତା ଖୋଲାଗଲା ✓ ଲଗଇନ୍ ହେଉଛି...');
      } catch (e) {
        toast('ଭୁଲ୍: ' + e.message.split('Firebase:')[0].trim());
      }
    });

    // ────────────────────────────────────────────────
    // Utils
    // ────────────────────────────────────────────────
    function toggleEye(id, btn) {
      const i = document.getElementById(id);
      if (!i) return;
      i.type = i.type === 'password' ? 'text' : 'password';
      btn.textContent = i.type === 'password' ? '👁️' : '🙈';
    }

    function toast(msg) {
      const t = document.getElementById('toastEl');
      if (!t) return;
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function vN() {
      const v = document.getElementById('rN')?.value?.trim() || '';
      const m = document.getElementById('rNm');
      if (m) {
        m.className = 'fmsg ' + (v.length < 2 ? 'err' : 'ok');
        m.textContent = v.length < 2 ? 'ଅତି କମ ୨' : '✓';
      }
    }

    function vP() {
      const v = document.getElementById('rP')?.value || '';
      const f = document.getElementById('strF');
      const m = document.getElementById('rPm');
      let s = 0;
      if (v.length >= 6) s++;
      if (v.length >= 10) s++;
      if (/[A-Z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (f) {
        f.style.width = (s * 25) + '%';
        f.style.background = ['','#ef5350','#FF6D00','#FFC107','#2E7D32'][s] || '#eee';
      }
      if (m) {
        m.className = 'fmsg ' + (v.length < 6 ? 'err' : 'ok');
        m.textContent = v.length < 6 ? 'ଅତି କମ ୬' : ['','ଦୁର୍ବଳ','ଠିକ','ଭଲ','ଶ୍ରେଷ୍ଠ'][s] || '';
      }
    }

    function vC() {
      const p1 = document.getElementById('rP')?.value || '';
      const p2 = document.getElementById('rP2')?.value || '';
      const m = document.getElementById('rCm');
      if (m) {
        m.className = 'fmsg ' + (p1 !== p2 ? 'err' : 'ok');
        m.textContent = p1 !== p2 ? 'ମିଳୁ ନାହିଁ ❌' : p2 ? '✓' : '';
      }
    }

    // Navigation (ସରଳ ରଖିଛି)
    function goScreen(s) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('on'));
      const target = document.getElementById('s' + s.charAt(0).toUpperCase() + s.slice(1));
      if (target) target.classList.add('on');

      document.querySelectorAll('.nv').forEach(el => el.classList.remove('on'));
      const nb = document.getElementById('nb-' + s);
      if (nb) nb.classList.add('on');
      
      toast(s + ' ଖୋଲାଗଲା');
    }

    // DOM Loaded – all event listeners safe
    window.addEventListener('DOMContentLoaded', () => {
      console.log("ଗୁଣ୍ଠପଡ଼ା କଥା – ଲୋଡ୍ ହେଲା");
      // ଏଠାରେ ଅନ୍ୟ ସବୁ listener ଯୋଡ଼ିବ (chat, post, story etc.)
    });
  </script>
</body>
</html>
